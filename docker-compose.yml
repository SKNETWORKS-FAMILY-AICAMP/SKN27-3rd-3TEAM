services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pokemon_db
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgre/utils/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - skn_net

  neo4j:
    image: neo4j:latest
    container_name: pokemon_neo4j
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    networks:
      - skn_net
    ports:
      - "7474:7474"  # HTTP - Neo4j Browser 접속용 (웹 브라우저에서 http://localhost:7474)
      - "7687:7687"  # Bolt - 애플리케이션에서 Neo4j에 연결할 때 사용하는 프로토콜
    volumes:
      - ./database/graph/neo4j/neo4j_data:/data          # 데이터베이스 데이터 저장 (그래프 데이터가 여기 저장됨)
      - ./database/graph/neo4j/neo4j_logs:/logs          # 로그 파일 저장
      - ./database/graph/neo4j/neo4j_import:/var/lib/neo4j/import  # CSV 등 임포트 파일을 넣을 위치
      - ./database/graph/neo4j/neo4j_plugins:/plugins    # 플러그인 파일 저장
    
    # 헬스체크: 컨테이너가 정상 작동하는지 주기적으로 확인
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s    # 10초마다 체크
      timeout: 5s      # 5초 내에 응답이 없으면 타임아웃
      retries: 5       # 5번 실패하면 비정상으로 판단

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pokemon_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 기존 pokemon_db 컨테이너 호스트명으로 직접 지정
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8080:8000"
    depends_on:
      - postgres
    networks:
      - skn_net
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./requirements.txt:/requirements.txt
    command: >
      sh -c "pip install --no-cache-dir -r /requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pokemon_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - skn_net
    volumes:
      - ./frontend:/app
      - ./database:/database
      - ./requirements.txt:/requirements.txt
    command: >
      sh -c "pip install --no-cache-dir -r /requirements.txt &&
             streamlit run app.py --server.port 8501 --server.address 0.0.0.0 --server.fileWatcherType poll"

networks:
  skn_net:
    driver: bridge

volumes:
  postgres_data:
  es_data:  
