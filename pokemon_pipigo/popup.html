<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 230px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f9f9f9; }
        .title { font-weight: bold; margin-bottom: 15px; color: #ff4757; font-size: 16px; }
        
        /* 컨트롤 영역 */
        .controls { background: white; border-radius: 15px; padding: 10px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .switch-container { display: flex; justify-content: space-between; align-items: center; padding: 8px 5px; }
        .switch-container:not(:last-child) { border-bottom: 1px solid #f1f2f6; }
        
        .switch-label { font-size: 13px; font-weight: 600; color: #2d3436; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff4757; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 파트너 리스트 (2x2 그리드) */
        .pk-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; justify-items: center; margin-bottom: 10px; padding: 5px; }
        .pk-item { width: 75px; height: 75px; cursor: pointer; border: 2px solid transparent; border-radius: 15px; transition: 0.2s; background: white; padding: 5px; object-fit: contain; }
        .pk-item:hover { border-color: #ff4757; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .status { font-size: 12px; margin-top: 15px; color: #636e72; padding: 10px; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="title">피피고 (Pipigo)</div>
    
    <div class="controls">
        <div class="switch-container">
            <span class="switch-label">포켓몬 활성화</span>
            <label class="switch">
                <input type="checkbox" id="power-switch" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="switch-container">
            <span class="switch-label">위치 고정 모드</span>
            <label class="switch">
                <input type="checkbox" id="fixed-switch">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="pk-list">
        <img src="img/1.gif" class="pk-item" title="피카츄(냠냠)">
        <img src="img/2.gif" class="pk-item" title="야돈(콧물)">
        <img src="img/3.gif" class="pk-item" title="리자몽(비행)">
        <img src="img/4.gif" class="pk-item" title="꼬부기(당당)">
    </div>

    <div class="status">파트너를 선택하세요!</div>
    <script src="popup.js"></script>
</body>
</html>
