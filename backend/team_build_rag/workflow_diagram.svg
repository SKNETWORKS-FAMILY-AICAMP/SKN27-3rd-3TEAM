<svg xmlns="http://www.w3.org/2000/svg" width="980" height="860" viewBox="0 0 980 860">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef7f1"/>
    </linearGradient>
    <linearGradient id="node" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="hybrid" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 800 34px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #475569; }
      .node-title { font: 800 20px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #0f172a; }
      .node-desc { font: 500 14px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #475569; }
      .small { font: 700 13px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #2563eb; }
      .edge { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .pill { fill: #dbeafe; stroke: #93c5fd; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="980" height="860" rx="28" fill="url(#bg)"/>
  <text x="490" y="62" text-anchor="middle" class="title">Team Build Hybrid RAG Workflow</text>
  <text x="490" y="92" text-anchor="middle" class="subtitle">
    Graph DB 계산과 Vector DB 근거를 합쳐 AI 해설을 만드는 흐름
  </text>

  <g filter="url(#shadow)">
    <rect x="340" y="125" width="300" height="62" rx="31" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="490" y="163" text-anchor="middle" class="node-title">START</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="230" width="400" height="78" rx="18" fill="url(#node)" stroke="#93c5fd" stroke-width="2"/>
    <text x="490" y="260" text-anchor="middle" class="node-title">supervisor</text>
    <text x="490" y="285" text-anchor="middle" class="node-desc">선택한 포켓몬 5마리 검증</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="350" width="400" height="78" rx="18" fill="url(#node)" stroke="#93c5fd" stroke-width="2"/>
    <text x="490" y="380" text-anchor="middle" class="node-title">select_graph_tool</text>
    <text x="490" y="405" text-anchor="middle" class="node-desc">덱 분석 또는 추천 도구 선택</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="470" width="360" height="86" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="250" y="502" text-anchor="middle" class="node-title">execution_graph_tool</text>
    <text x="250" y="527" text-anchor="middle" class="node-desc">Neo4j 기반 타입/추천 계산</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="550" y="470" width="360" height="86" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="730" y="502" text-anchor="middle" class="node-title">vector_search</text>
    <text x="730" y="527" text-anchor="middle" class="node-desc">pgvector에서 설명 근거 검색</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="600" width="400" height="82" rx="18" fill="url(#node)" stroke="#93c5fd" stroke-width="2"/>
    <text x="490" y="632" text-anchor="middle" class="node-title">evaluate_with_llm</text>
    <text x="490" y="657" text-anchor="middle" class="node-desc">Graph 결과와 Vector 근거 결합</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="715" width="400" height="82" rx="18" fill="url(#hybrid)" stroke="#34d399" stroke-width="3"/>
    <text x="490" y="747" text-anchor="middle" class="node-title">hybrid_scorer</text>
    <text x="490" y="772" text-anchor="middle" class="node-desc">graph_score + vector_score = hybrid_score</text>
  </g>

  <path class="edge" d="M490 187 L490 230"/>
  <path class="edge" d="M490 308 L490 350"/>
  <path class="edge" d="M490 428 C490 450 390 456 300 470"/>
  <path class="edge" d="M490 428 C490 450 590 456 680 470"/>
  <path class="edge" d="M250 556 C250 585 380 592 455 600"/>
  <path class="edge" d="M730 556 C730 585 600 592 525 600"/>
  <path class="edge" d="M490 682 L490 715"/>

  <g transform="translate(75 622)">
    <rect width="170" height="34" rx="17" class="pill"/>
    <text x="85" y="22" text-anchor="middle" class="small">Graph 계산 근거</text>
  </g>
  <path class="dash" d="M250 556 C220 585 190 600 160 622"/>

  <g transform="translate(735 622)">
    <rect width="170" height="34" rx="17" class="pill"/>
    <text x="85" y="22" text-anchor="middle" class="small">Vector 검색 근거</text>
  </g>
  <path class="dash" d="M730 556 C760 585 790 600 820 622"/>

  <g transform="translate(140 820)">
    <rect width="700" height="1" fill="#cbd5e1"/>
  </g>
  <text x="490" y="842" text-anchor="middle" class="subtitle">
    AI 답변은 Graph 근거 50%와 Vector 근거 50%를 반영하고, 추천 순위는 hybrid_score를 사용합니다.
  </text>
</svg>
