<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1680" viewBox="0 0 1500 1680" role="img" aria-labelledby="title desc">
  <title id="title">Team Build Hybrid RAG Workflow</title>
  <desc id="desc">graph_result 이후 Graph 계산 근거와 Vector 검색 근거가 두 갈래로 나뉘고, evaluate_with_llm에서 다시 합쳐지는 팀 빌더 Hybrid RAG 흐름입니다.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>

    <linearGradient id="graphGroup" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#E8F8F0"/>
    </linearGradient>

    <linearGradient id="vectorGroup" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>

    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.13"/>
    </filter>

    <marker id="arrow" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#334155"/>
    </marker>

    <style>
      .title {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
        font-size: 42px;
        font-weight: 900;
        fill: #0F172A;
      }

      .subtitle {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
        font-size: 19px;
        font-weight: 600;
        fill: #64748B;
      }

      .group-title {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
        font-size: 24px;
        font-weight: 900;
        fill: #0F172A;
      }

      .node-title {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
        font-size: 24px;
        font-weight: 900;
        fill: #111827;
      }

      .node-desc {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
        font-size: 17px;
        font-weight: 650;
        fill: #475569;
      }

      .pill-text {
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
        font-size: 21px;
        font-weight: 900;
        fill: #0F172A;
      }

      .edge {
        fill: none;
        stroke: #334155;
        stroke-width: 3;
        marker-end: url(#arrow);
      }

      .edge-soft {
        fill: none;
        stroke: #64748B;
        stroke-width: 2.8;
        stroke-dasharray: 9 9;
        marker-end: url(#arrow);
      }
    </style>
  </defs>

  <rect width="1500" height="1680" rx="34" fill="url(#bg)"/>

  <text x="750" y="64" text-anchor="middle" class="title">Team Build Hybrid RAG Workflow</text>
  <text x="750" y="100" text-anchor="middle" class="subtitle">Graph DB 계산 근거와 Vector DB 문서 근거가 갈라졌다가 다시 합쳐지는 팀 빌더 RAG 흐름</text>

  <!-- Start -->
  <rect x="565" y="140" width="370" height="62" rx="31" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="750" y="180" text-anchor="middle" class="pill-text">5마리 포켓몬 선택</text>

  <path class="edge" d="M750 202 L750 248"/>

  <!-- Supervisor -->
  <rect x="480" y="248" width="540" height="90" rx="20" fill="url(#node)" stroke="#CBD5E1" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="750" y="284" text-anchor="middle" class="node-title">supervisor</text>
  <text x="750" y="315" text-anchor="middle" class="node-desc">요청 검증 및 실행 상태 준비</text>

  <path class="edge" d="M750 338 L750 386"/>

  <!-- Select graph tool -->
  <rect x="480" y="386" width="540" height="90" rx="20" fill="url(#node)" stroke="#CBD5E1" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="750" y="422" text-anchor="middle" class="node-title">select_graph_tool</text>
  <text x="750" y="453" text-anchor="middle" class="node-desc">분석/추천 Graph 도구 선택</text>

  <path class="edge" d="M750 476 L750 530"/>

  <!-- Graph DB section -->
  <rect x="380" y="510" width="740" height="295" rx="30" fill="url(#graphGroup)" stroke="#86EFAC" stroke-width="2.4"/>
  <text x="750" y="552" text-anchor="middle" class="group-title">Graph DB 기반 계산</text>

  <rect x="500" y="585" width="500" height="88" rx="18" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="750" y="620" text-anchor="middle" class="node-title">execution_graph_tool</text>
  <text x="750" y="650" text-anchor="middle" class="node-desc">약점/저항/추천 후보 계산</text>

  <path class="edge" d="M750 673 L750 710"/>

  <rect x="550" y="710" width="400" height="72" rx="18" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="750" y="741" text-anchor="middle" class="node-title">graph_result</text>
  <text x="750" y="767" text-anchor="middle" class="node-desc">계산 근거</text>

  <!-- Split from graph_result -->
  <circle cx="750" cy="830" r="7" fill="#334155"/>
  <path class="edge" d="M750 782 L750 830"/>

  <!-- Left branch: graph_result goes directly to evidence merge -->
  <path class="edge-soft" d="M750 830 C500 885 420 1090 590 1198"/>

  <!-- Right branch: graph_result guides vector search -->
  <path class="edge" d="M750 830 C890 855 980 895 1045 950"/>

  <!-- Vector DB section on the right -->
  <rect x="820" y="900" width="560" height="360" rx="30" fill="url(#vectorGroup)" stroke="#93C5FD" stroke-width="2.4"/>
  <text x="1100" y="942" text-anchor="middle" class="group-title">Vector DB 기반 근거 검색</text>

  <rect x="890" y="980" width="420" height="78" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="1100" y="1011" text-anchor="middle" class="node-title">vector_query 생성</text>
  <text x="1100" y="1038" text-anchor="middle" class="node-desc">Graph 결과 기반 검색어</text>

  <path class="edge" d="M1100 1058 L1100 1090"/>

  <rect x="890" y="1090" width="420" height="78" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="1100" y="1121" text-anchor="middle" class="node-title">vector_search</text>
  <text x="1100" y="1148" text-anchor="middle" class="node-desc">문서 근거 검색</text>

  <path class="edge" d="M1100 1168 L1100 1200"/>

  <rect x="920" y="1200" width="360" height="62" rx="18" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="1100" y="1226" text-anchor="middle" class="node-title">vector_documents</text>
  <text x="1100" y="1249" text-anchor="middle" class="node-desc">설명 근거</text>

  <!-- Right branch returns to merge -->
  <path class="edge" d="M1100 1262 C1050 1325 910 1325 835 1288"/>

  <!-- Evidence merge -->
  <rect x="480" y="1240" width="540" height="90" rx="20" fill="url(#node)" stroke="#CBD5E1" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="750" y="1276" text-anchor="middle" class="node-title">evaluate_with_llm</text>
  <text x="750" y="1307" text-anchor="middle" class="node-desc">Graph + Vector 근거 결합</text>

  <path class="edge" d="M750 1330 L750 1374"/>

  <!-- Score and answer -->
  <rect x="480" y="1374" width="540" height="78" rx="20" fill="url(#node)" stroke="#CBD5E1" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="750" y="1405" text-anchor="middle" class="node-title">hybrid_scorer</text>
  <text x="750" y="1432" text-anchor="middle" class="node-desc">hybrid_score 계산</text>

  <path class="edge" d="M1020 1413 C1200 1413 1200 1486 1020 1486"/>

  <rect x="480" y="1486" width="540" height="78" rx="20" fill="url(#node)" stroke="#CBD5E1" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="750" y="1517" text-anchor="middle" class="node-title">answer_generator</text>
  <text x="750" y="1544" text-anchor="middle" class="node-desc">AI 해설 생성</text>

  <path class="edge" d="M480 1525 C300 1525 300 1605 565 1605"/>

  <rect x="565" y="1589" width="370" height="62" rx="31" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2.2" filter="url(#shadow)"/>
  <text x="750" y="1629" text-anchor="middle" class="pill-text">결과 반환</text>
</svg>
