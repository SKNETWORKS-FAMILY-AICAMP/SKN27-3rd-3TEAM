<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1180" viewBox="0 0 980 1180">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef7f1"/>
    </linearGradient>
    <linearGradient id="node" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="hybrid" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 800 34px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #475569; }
      .node-title { font: 800 20px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #0f172a; }
      .node-desc { font: 500 14px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #475569; }
      .small { font: 700 13px "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; fill: #2563eb; }
      .edge { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .pill { fill: #dbeafe; stroke: #93c5fd; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="980" height="1180" rx="28" fill="url(#bg)"/>
  <text x="490" y="62" text-anchor="middle" class="title">Team Build Hybrid RAG Workflow</text>
  <text x="490" y="92" text-anchor="middle" class="subtitle">
    실제 LangGraph 실행 순서와 동일한 팀 빌더 RAG 흐름
  </text>

  <g filter="url(#shadow)">
    <rect x="340" y="125" width="300" height="62" rx="31" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="490" y="163" text-anchor="middle" class="node-title">__start__</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="230" width="400" height="78" rx="18" fill="url(#node)" stroke="#93c5fd" stroke-width="2"/>
    <text x="490" y="260" text-anchor="middle" class="node-title">supervisor</text>
    <text x="490" y="285" text-anchor="middle" class="node-desc">요청 검증</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="350" width="400" height="78" rx="18" fill="url(#node)" stroke="#93c5fd" stroke-width="2"/>
    <text x="490" y="380" text-anchor="middle" class="node-title">select_graph_tool</text>
    <text x="490" y="405" text-anchor="middle" class="node-desc">분석/추천 Graph 도구 선택</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="470" width="400" height="82" rx="18" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="490" y="502" text-anchor="middle" class="node-title">execution_graph_tool</text>
    <text x="490" y="527" text-anchor="middle" class="node-desc">Neo4j Graph DB 실행</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="595" width="400" height="82" rx="18" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="490" y="627" text-anchor="middle" class="node-title">vector_search</text>
    <text x="490" y="652" text-anchor="middle" class="node-desc">pgvector 근거 검색</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="720" width="400" height="82" rx="18" fill="url(#node)" stroke="#93c5fd" stroke-width="2"/>
    <text x="490" y="752" text-anchor="middle" class="node-title">evaluate_with_llm</text>
    <text x="490" y="777" text-anchor="middle" class="node-desc">Graph + Vector 근거 결합</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="845" width="400" height="82" rx="18" fill="url(#hybrid)" stroke="#34d399" stroke-width="3"/>
    <text x="490" y="877" text-anchor="middle" class="node-title">hybrid_scorer</text>
    <text x="490" y="902" text-anchor="middle" class="node-desc">Graph + Vector 점수 결합</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="970" width="400" height="82" rx="18" fill="#fdf2f8" stroke="#f9a8d4" stroke-width="2"/>
    <text x="490" y="1002" text-anchor="middle" class="node-title">answer_generator</text>
    <text x="490" y="1027" text-anchor="middle" class="node-desc">LLM 기반 AI 해설 생성</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="1090" width="300" height="62" rx="31" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
    <text x="490" y="1128" text-anchor="middle" class="node-title">__end__</text>
  </g>

  <path class="edge" d="M490 187 L490 230"/>
  <path class="edge" d="M490 308 L490 350"/>
  <path class="edge" d="M490 428 L490 470"/>
  <path class="edge" d="M490 552 L490 595"/>
  <path class="edge" d="M490 677 L490 720"/>
  <path class="edge" d="M490 802 L490 845"/>
  <path class="edge" d="M490 927 L490 970"/>
  <path class="edge" d="M490 1052 L490 1090"/>

  <g transform="translate(720 492)">
    <rect width="190" height="34" rx="17" class="pill"/>
    <text x="95" y="22" text-anchor="middle" class="small">Graph DB 계산 결과</text>
  </g>
  <path class="dash" d="M690 512 C780 560 800 680 690 750"/>

  <g transform="translate(720 617)">
    <rect width="190" height="34" rx="17" class="pill"/>
    <text x="95" y="22" text-anchor="middle" class="small">Vector DB 검색 근거</text>
  </g>
  <path class="dash" d="M690 637 C760 670 760 715 690 760"/>

  <g transform="translate(720 762)">
    <rect width="150" height="34" rx="17" class="pill"/>
    <text x="75" y="22" text-anchor="middle" class="small">RAG Context</text>
  </g>
  <path class="dash" d="M690 780 C820 835 820 960 690 1010"/>

  <text x="490" y="1168" text-anchor="middle" class="subtitle">
    기준: backend/team_build_rag/workflow.py의 WORKFLOW_MERMAID 및 add_edge 실행 순서
  </text>
</svg>
